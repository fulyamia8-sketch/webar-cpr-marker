<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <a-box
        id="stepBox"
        position="0 0 0"
        depth="0.1"
        height="0.3"
        width="0.8"
        color="red">
      </a-box>

      <a-text
        id="stepText"
        value="STEP 1: Check responsiveness"
        position="-0.9 0.55 0"
        width="2.2"
        color="black"
        align="center">
      </a-text>

    </a-entity>
  </a-scene>

  <button onclick="nextStep()" style="
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    padding: 14px 24px;
    font-size: 18px;">
    Next Step
  </button>

  <script>
    const steps = [
      "STEP 1: Check responsiveness",
      "STEP 2: Call emergency services",
      "STEP 3: Open the airway",
      "STEP 4: Check breathing",
      "STEP 5: Place hands on the centre of the chest",
      "STEP 6: Start chest compressions",
      "STEP 7: Push hard and fast at a steady rhythm",
      "STEP 8: Continue until help arrives"
    ];

    const colors = [
      "blue",
      "orange",
      "white",
      "cyan",
      "red",
      "purple",
      "yellow",
      "green"
    ];

    let currentStep = 0;

    function nextStep() {
      currentStep++;

      if (currentStep >= steps.length) {
        currentStep = 0;
      }

      document.querySelector("#stepText").setAttribute("value", steps[currentStep]);
      document.querySelector("#stepBox").setAttribute("color", colors[currentStep]);
    }
  </script>
</body>
</html>
