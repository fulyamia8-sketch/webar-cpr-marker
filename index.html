<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebAR CPR Training</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true">

  <a-assets>
    <a-asset-item id="asset0" src="./models/patient.glb"></a-asset-item>
    <a-asset-item id="asset1" src="./models/smartphone.glb"></a-asset-item>
    <a-asset-item id="asset2" src="./models/head.glb"></a-asset-item>
    <a-asset-item id="asset3" src="./models/lungs.glb"></a-asset-item>
    <a-asset-item id="asset4" src="./models/hand.glb"></a-asset-item>
    <a-asset-item id="asset5" src="./models/heart.glb"></a-asset-item>
    <a-asset-item id="asset6" src="./models/alarm_clock.glb"></a-asset-item>
    <a-asset-item id="asset7" src="./models/ambulance.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-entity id="model0" gltf-model="#asset0" position="0 0 0.18" rotation="0 0 0" scale="0.35 0.35 0.35" visible="false"></a-entity>
    <a-entity id="model1" gltf-model="#asset1" position="0 0 0.18" rotation="0 0 0" scale="0.08 0.08 0.08" visible="false"></a-entity>
    <a-entity
    id="model2"
    gltf-model="#asset2"
    position="0 0 0.18"
    rotation="0 180 0"
    scale="55 55 55"
    visible="false">
</a-entity>
    <a-entity id="model3" gltf-model="#asset3" position="0 0 0.18" rotation="0 0 0" scale="0.35 0.35 0.35" visible="false"></a-entity>
    <a-entity id="model4" gltf-model="#asset4" position="0 0 0.18" rotation="0 0 0" scale="0.35 0.35 0.35" visible="false"></a-entity>
    <a-entity id="model5" gltf-model="#asset5" position="0 0 0.18" rotation="0 0 0" scale="0.35 0.35 0.35" visible="false"></a-entity>
    <a-entity id="model6" gltf-model="#asset6" position="0 0 0.18" rotation="0 0 0" scale="1.2 1.2 1.2" visible="false"></a-entity>
    <a-entity id="model7" gltf-model="#asset7" position="0 0 0.18" rotation="0 0 0" scale="0.35 0.35 0.35" visible="false"></a-entity>

    <a-text
      id="stepText"
      value="STEP 1&#10;Check responsiveness"
      position="0 0.48 0.05"
      width="2.3"
      align="center"
      anchor="center"
      color="#000000"
      scale="0.9 0.9 0.9">
    </a-text>

  </a-entity>
</a-scene>

<button onclick="nextStep()" style="
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  padding: 14px 26px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background-color: #1565C0;
  color: white;">
  Next Step
</button>

<script>
  const steps = [
    "STEP 1: Check responsiveness",
    "STEP 2: Call emergency services",
    "STEP 3: Open the airway",
    "STEP 4: Check breathing",
    "STEP 5: Place hands on the centre of the chest",
    "STEP 6: Start chest compressions",
    "STEP 7: Push hard and fast at a steady rhythm",
    "STEP 8: Continue until help arrives"
  ];

  const colors = [
    "#1565C0",
    "#EF6C00",
    "#455A64",
    "#00ACC1",
    "#D32F2F",
    "#7B1FA2",
    "#F9A825",
    "#2E7D32"
  ];

  let currentStep = 0;

  function updateStep() {
    document.querySelector("#stepText").setAttribute(
      "value",
      steps[currentStep].replace(": ", "\n")
    );

    for (let i = 0; i < 8; i++) {
      const model = document.querySelector("#model" + i);
      model.setAttribute("visible", i === currentStep);
    }

    document.querySelector("button").style.backgroundColor = colors[currentStep];
  }

  function nextStep() {
    currentStep++;

    if (currentStep >= steps.length) {
      currentStep = 0;
    }

    updateStep();
  }

  updateStep();
</script>

</body>
</html>
